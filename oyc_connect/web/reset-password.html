<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – OYC Connect</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; margin: 0 0 8px; color: #fff; }
    p { margin: 0 0 24px; color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #15803d; }
    .muted { font-size: 0.85rem; color: #64748b; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OYC Connect</h1>
    <p id="message">Opening the app to set your new password…</p>
    <button type="button" class="btn" id="openApp" style="display: none;">
      Open in app
    </button>
  </div>
  <p class="muted" id="hint" style="display: none;">
    Open this link on your phone where the OYC Connect app is installed, or open the app and use Forgot Password again.
  </p>

  <script>
    var appUrl = 'oycconnect://reset-password' + (window.location.hash || '');
    var opened = false;

    function tryOpenApp() {
      if (opened) return;
      opened = true;
      window.location.href = appUrl;
      document.getElementById('message').textContent = 'If the app did not open, tap the button below.';
      document.getElementById('openApp').style.display = 'inline-block';
      document.getElementById('hint').style.display = 'block';
      setTimeout(function() {
        document.getElementById('message').textContent = 'Tap "Open in app" below, or open the OYC Connect app on your phone and use Forgot Password to get a new link.';
      }, 2000);
    }

    document.getElementById('openApp').onclick = tryOpenApp;

    if (window.location.hash && window.location.hash.length > 1) {
      tryOpenApp();
    } else {
      document.getElementById('message').textContent = 'This page is for password reset. Open the reset link from your email on this device, or open the OYC Connect app and use Forgot Password.';
      document.getElementById('hint').style.display = 'block';
    }
  </script>
</body>
</html>
