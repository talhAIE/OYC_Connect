
[functions.stripe-payment-intent]
enabled = true
# Allow invoke without user JWT so donation works for anon or any session (create payment intent only; saving payment uses RLS).
verify_jwt = false
import_map = "./functions/stripe-payment-intent/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/stripe-payment-intent/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/stripe-payment-intent/*.html" ]

[functions.notify-admins]
enabled = true
verify_jwt = true
import_map = "./functions/notify-admins/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-admins/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-admins/*.html" ]
